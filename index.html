<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>HEROVEE V12.0 | DEEPSEEK ACTIVATED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --green: #00ff44; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .container { flex: 1; display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .grid { background: rgba(10, 10, 10, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .left-grid { display: grid; grid-template-rows: 220px 200px 1fr; gap: 10px; border: none; }
        .panel { background: #050505; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; }
        .header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); padding: 8px; border-bottom: 1px solid #111; background: rgba(0,242,255,0.05); text-transform: uppercase; letter-spacing: 1px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); border-bottom: 1px solid #222; }
        .map-frame { width: 100%; height: 100%; border: 0; filter: invert(90%) hue-rotate(180deg) brightness(0.8); }

        /* Multi-color Coding Box */
        .coding-box { padding: 10px; font-family: 'Courier New', monospace; font-size: 11px; overflow-y: hidden; line-height: 1.5; }
        .c-g { color: var(--green); }
        .c-p { color: var(--pink); }
        .c-n { color: var(--neon); }
        .c-v { color: var(--purple); }

        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0d001a 0%, #000 100%); }
        .herovee-btn { 
            width: 280px; height: 280px; border-radius: 50%; border: 4px solid var(--purple);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; 
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
        }
        .herovee-btn:active { transform: scale(0.95); }
        .herovee-text { font-family: 'Orbitron'; color: var(--neon); font-size: 32px; font-weight: bold; text-shadow: 0 0 15px var(--neon); pointer-events: none; }
        .status-text { font-size: 11px; color: #555; margin-top: 10px; font-family: 'Orbitron'; letter-spacing: 3px; pointer-events: none; }
        
        .pulse-active { animation: pulse 0.7s infinite alternate; border-color: var(--neon) !important; box-shadow: 0 0 60px var(--neon) !important; }
        @keyframes pulse { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.08); filter: brightness(1.3); } }

        .chat-box { flex: 1; display: flex; flex-direction: column; background: #080808; border-left: 1px solid #222; }
        .msg-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .ai-msg { background: rgba(255, 0, 85, 0.08); border-left: 3px solid var(--pink); padding: 12px; border-radius: 4px; color: #ccc; align-self: flex-start; max-width: 85%; font-size: 14px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .user-msg { background: rgba(0, 242, 255, 0.08); border-right: 3px solid var(--neon); padding: 12px; border-radius: 4px; color: var(--neon); align-self: flex-end; font-size: 14px; }
        
        .input-area { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; background: #050505; }
        input { flex: 1; background: #111; border: 1px solid #333; padding: 14px; color: #fff; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="panel">
                <div class="header"><i class="fas fa-video"></i> visual_uplink_01</div>
                <video id="v" autoplay muted playsinline></video>
            </div>
            <div class="panel">
                <div class="header"><i class="fas fa-globe"></i> world_node_tracking</div>
                <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14602.254272231177!2d90.4125!3d23.8103!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sbd!4v1620000000000!5m2!1sen!2sbd"></iframe>
            </div>
            <div class="panel coding-box" id="codeStream">
                <div class="header" style="margin-bottom:8px; color: var(--neon);">deepseek_core_kinetics</div>
                <div class="c-g">> system_ready: true</div>
            </div>
        </div>

        <div class="grid ai-core">
            <div class="herovee-btn" id="voiceBtn" onclick="toggleVoice()">
                <div class="herovee-text">HEROVEE</div>
                <div class="status-text" id="status">TAP TO SPEAK</div>
            </div>
        </div>

        <div class="grid chat-box">
            <div class="header"><i class="fas fa-terminal"></i> secure_comms_v12</div>
            <div class="msg-area" id="msgArea">
                <div class="ai-msg">স্বাগতম বস্। DeepSeek ইঞ্জিন সক্রিয়। আমি আপনার নির্দেশের অপেক্ষায় আছি।</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="আপনার কমান্ড লিখুন..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <script>
        // DeepSeek API Configuration
        const DEEPSEEK_API_KEY = "Sk-026040ac4ebc43cbbdf08410c8e38bd1";
        const API_URL = "https://api.deepseek.com/v1/chat/completions";

        const synth = window.speechSynthesis;
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-BD';
        recognition.continuous = false;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            ut.voice = voices.find(v => v.lang.includes('bn')) || voices[0];
            ut.pitch = 0.85; 
            ut.rate = 1.0;
            ut.onstart = () => document.getElementById('voiceBtn').classList.add('pulse-active');
            ut.onend = () => document.getElementById('voiceBtn').classList.remove('pulse-active');
            synth.speak(ut);
        }

        // DeepSeek API Call
        async function getAIResponse(prompt) {
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: "You are HEROVEE, an advanced AI created by Sadaf. Speak in smart, commanding yet respectful Bengali." },
                            { role: "user", content: prompt }
                        ],
                        stream: false
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                console.error("API Error:", e);
                return "বস্, কানেকশনে ত্রুটি দেখা দিচ্ছে। এপিআই কী অথবা সার্ভার চেক করুন।";
            }
        }

        // Voice Control (Tap to start, auto stop)
        function toggleVoice() {
            if (!isListening) {
                recognition.start();
                isListening = true;
                document.getElementById('status').innerText = "LISTENING...";
                document.getElementById('voiceBtn').style.borderColor = "var(--green)";
            } else {
                recognition.stop();
                isListening = false;
                document.getElementById('status').innerText = "TAP TO SPEAK";
            }
        }

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            addMsg('user', speech);
            isListening = false;
            document.getElementById('status').innerText = "THINKING...";
            
            const response = await getAIResponse(speech);
            addMsg('ai', response);
            speak(response);
            document.getElementById('status').innerText = "TAP TO SPEAK";
        };

        async function sendChat() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if(!prompt) return;
            addMsg('user', prompt);
            input.value = "";
            const response = await getAIResponse(prompt);
            addMsg('ai', response);
            speak(response);
        }

        function addMsg(role, text) {
            const area = document.getElementById('msgArea');
            area.innerHTML += `<div class="${role}-msg">${text}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        // Multi-color Coding Stream Animation
        const codeColors = ['c-g', 'c-p', 'c-n', 'c-v'];
        setInterval(() => {
            const cs = document.getElementById('codeStream');
            const d = document.createElement('div');
            const colorClass = codeColors[Math.floor(Math.random() * codeColors.length)];
            d.className = colorClass;
            d.innerText = `> ${Math.random().toString(36).substring(2, 11).toUpperCase()}_LOG_INIT`;
            cs.appendChild(d);
            if(cs.childNodes.length > 20) cs.removeChild(cs.childNodes[1]);
        }, 1000);

        async function initCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
            } catch(e) { console.log("Cam feed blocked."); }
        }

        window.onload = () => { initCamera(); };
    </script>
</body>
</html>
