<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>HEROVEE V9.0 | AI VOICE CORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --green: #00ff44; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .container { flex: 1; display: grid; grid-template-columns: 360px 1fr 360px; gap: 12px; padding: 15px; }
        .grid { background: rgba(15, 15, 15, 0.95); border: 1px solid #222; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }

        /* Left Panel */
        .left-grid { display: grid; grid-template-rows: 250px 220px 1fr; gap: 10px; border: none; }
        .sub-panel { background: #080808; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; }
        .panel-header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); padding: 10px; border-bottom: 1px solid #111; letter-spacing: 2px; background: rgba(0, 242, 255, 0.05); }

        /* Face Scan UI */
        .cam-box { flex: 1; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #scanLine { 
            position: absolute; width: 100%; height: 3px; background: var(--green); 
            box-shadow: 0 0 15px var(--green); top: 0; z-index: 5; opacity: 0; 
        }
        .scan-active { animation: moveLine 3s infinite linear; opacity: 1 !important; }
        @keyframes moveLine { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Map Section */
        .map-frame { width: 100%; height: 100%; border: 0; filter: invert(90%) hue-rotate(180deg) brightness(0.8); }

        /* AI Core with HEROVEE */
        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0d001a 0%, #000 100%); }
        .visual { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; width: 100%; height: 100%; border: 2px dashed var(--purple); border-radius: 50%; animation: rot 20s linear infinite; }
        .glow { position: absolute; width: 120px; height: 120px; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); border-radius: 50%; filter: blur(20px); }
        .herovee-text { font-family: 'Orbitron'; color: var(--neon); font-size: 22px; font-weight: bold; z-index: 10; text-shadow: 0 0 15px var(--neon); }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Voice Animation */
        .talking { animation: pulse 0.4s infinite alternate !important; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); filter: blur(5px); } }

        /* Chat Input */
        .input-box { width: 85%; position: relative; margin-top: 30px; }
        .main-input { 
            width: 100%; background: #050505; border: 1px solid var(--neon); border-radius: 30px; 
            padding: 18px 25px; color: var(--neon); font-size: 16px; outline: none; text-align: center;
        }

        /* Logs */
        .logs { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .ai-msg { color: #aaa; border-left: 3px solid var(--pink); padding: 8px; margin-bottom: 10px; background: rgba(255,0,85,0.02); }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="sub-panel">
                <div class="panel-header">FACE_SCAN_SURVEILLANCE</div>
                <div class="cam-box">
                    <div id="scanLine"></div>
                    <video id="v" autoplay muted playsinline></video>
                    <button id="btn" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:10px; background:var(--pink); border:none; color:#fff; cursor:pointer;">ACTIVATE SCANNER</button>
                </div>
            </div>
            <div class="sub-panel">
                <div class="panel-header">POSITION_INTEL</div>
                <iframe class="map-frame" src="https://maps.google.com/maps?width=360&height=220&hl=en&q=Bangladesh&t=p&z=5&ie=UTF8&iwloc=B&output=embed"></iframe>
            </div>
            <div class="sub-panel logs" id="logBox">
                <div class="ai-msg">সিস্টেম অনলাইন। আপনার আদেশের অপেক্ষায়...</div>
            </div>
        </div>

        <div class="grid ai-core">
            <div class="visual">
                <div class="ring"></div>
                <div class="glow" id="glow"></div>
                <div class="herovee-text">HEROVEE</div>
            </div>
            <div class="input-box">
                <input type="text" id="in" class="main-input" placeholder="এখানে বাংলা লিখুন..." onkeypress="if(event.key==='Enter') action()">
            </div>
        </div>

        <div class="grid">
            <div class="panel-header" style="color:var(--purple)">ENCRYPTED_DATA_STREAM</div>
            <div id="stream" style="padding:15px; color:var(--green); font-family:monospace; font-size:12px;"></div>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        
        // সুন্দর বাংলা ভয়েস সেটআপ
        function speak(text) {
            if (synth.speaking) synth.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            
            // সব ভয়েস থেকে বাংলা ভয়েস খুঁজে বের করা
            const voices = synth.getVoices();
            const bnVoice = voices.find(v => v.lang.includes('bn') || v.name.includes('Bengali') || v.name.includes('Microsoft Hemant'));
            
            if (bnVoice) ut.voice = bnVoice;
            ut.lang = 'bn-BD';
            ut.pitch = 0.8; // একটু গম্ভীর AI ভয়েস
            ut.rate = 0.9;  // গলার গতি
            
            ut.onstart = () => document.getElementById('glow').classList.add('talking');
            ut.onend = () => document.getElementById('glow').classList.remove('talking');
            
            synth.speak(ut);
        }

        function action() {
            const input = document.getElementById('in');
            const val = input.value.trim();
            if(val) {
                speak(val); // এখন এটি সুন্দর বাংলায় পড়বে
                const l = document.getElementById('logBox');
                l.innerHTML += `<div class="ai-msg" style="color:var(--neon)">${val}</div>`;
                l.scrollTop = l.scrollHeight;
                input.value = "";
            }
        }

        // ক্যামেরা এবং স্ক্যানার
        document.getElementById('btn').onclick = async function() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                this.style.display = 'none';
                document.getElementById('scanLine').classList.add('scan-active');
                speak("ফেস স্ক্যানিং শুরু হয়েছে। টার্গেট আইডেন্টিফাইড।");
            } catch(e) { alert("Camera Error!"); }
        };

        // ডাটা স্ট্রিম এনিমেশন
        setInterval(() => {
            const s = document.getElementById('stream');
            const d = document.createElement('div');
            d.innerText = `> RECV_DATA_SYNC_${Math.random().toString(16).slice(2,6).toUpperCase()}`;
            s.appendChild(d);
            if(s.childNodes.length > 20) s.removeChild(s.firstChild);
        }, 1000);

        window.onload = () => { synth.getVoices(); };
    </script>
</body>
</html>
