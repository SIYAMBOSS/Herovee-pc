<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>HEROVEE V12.0 | DEEPSEEK FIXED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --green: #00ff44; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .container { flex: 1; display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .grid { background: rgba(10, 10, 10, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .left-grid { display: grid; grid-template-rows: 220px 200px 1fr; gap: 10px; border: none; }
        .panel { background: #050505; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; }
        .header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); padding: 8px; border-bottom: 1px solid #111; background: rgba(0,242,255,0.05); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .map-frame { width: 100%; height: 100%; border: 0; filter: invert(90%) hue-rotate(180deg); }
        .coding-box { padding: 10px; font-family: monospace; font-size: 11px; overflow-y: hidden; }
        .c-g { color: var(--green); } .c-p { color: var(--pink); } .c-n { color: var(--neon); } .c-v { color: var(--purple); }
        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0d001a 0%, #000 100%); }
        .herovee-btn { width: 280px; height: 280px; border-radius: 50%; border: 4px solid var(--purple); display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: 0.3s; box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }
        .herovee-text { font-family: 'Orbitron'; color: var(--neon); font-size: 32px; font-weight: bold; text-shadow: 0 0 15px var(--neon); }
        .status-text { font-size: 11px; color: #555; margin-top: 10px; font-family: 'Orbitron'; letter-spacing: 2px; }
        .pulse-active { animation: pulse 0.6s infinite alternate; border-color: var(--neon) !important; box-shadow: 0 0 60px var(--neon) !important; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
        .chat-box { flex: 1; display: flex; flex-direction: column; background: #080808; }
        .msg-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { background: rgba(255, 0, 85, 0.1); border-left: 3px solid var(--pink); padding: 10px; border-radius: 4px; color: #ddd; align-self: flex-start; max-width: 90%; font-size: 14px; }
        .user-msg { background: rgba(0, 242, 255, 0.1); border-right: 3px solid var(--neon); padding: 10px; border-radius: 4px; color: var(--neon); align-self: flex-end; font-size: 14px; }
        .input-area { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="panel"><div class="header">VISUAL_UPLINK</div><video id="v" autoplay muted playsinline></video></div>
            <div class="panel"><div class="header">GEO_TRACKING</div><iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d116833.83185606161!2d90.4192704!3d23.810332!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sbd!4v1700000000000"></iframe></div>
            <div class="panel coding-box" id="codeStream"><div class="header" style="color:var(--neon)">DEEPSEEK_NODE</div></div>
        </div>
        <div class="grid ai-core"><div class="herovee-btn" id="voiceBtn" onclick="toggleVoice()"><div class="herovee-text">HEROVEE</div><div class="status-text" id="status">TAP TO SPEAK</div></div></div>
        <div class="grid chat-box"><div class="header">SECURE_COMMS</div><div class="msg-area" id="msgArea"><div class="ai-msg">সিস্টেম অনলাইন। বস্, আপনার DeepSeek ইঞ্জিন এখন কাজ করবে।</div></div><div class="input-area"><input type="text" id="userInput" placeholder="কমান্ড লিখুন..." onkeypress="if(event.key==='Enter') sendChat()"></div></div>
    </div>

    <script>
        // আপনার নতুন API Key
        const DEEPSEEK_KEY = "Sk-026040ac4ebc43cbbdf08410c8e38bd1";
        
        const synth = window.speechSynthesis;
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-BD';

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            ut.voice = voices.find(v => v.lang.includes('bn')) || voices[0];
            ut.pitch = 0.8; ut.rate = 1.0;
            ut.onstart = () => document.getElementById('voiceBtn').classList.add('pulse-active');
            ut.onend = () => document.getElementById('voiceBtn').classList.remove('pulse-active');
            synth.speak(ut);
        }

        // ১০০% কাজ করার জন্য Proxy পদ্ধতি
        async function getAIResponse(prompt) {
            try {
                // আমরা সরাসরি DeepSeek কল না করে 'cors-anywhere' বা প্রক্সি ব্যবহার করছি
                const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${DEEPSEEK_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: "You are HEROVEE, a smart AI by Sadaf." },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                if (data.choices) return data.choices[0].message.content;
                return "বস্, এপিআই কি-তে সমস্যা বা ব্যালেন্স নেই।";
            } catch (e) {
                // যদি CORS সমস্যা হয়, তবে Groq এপিআই-এ সুইচ করা বুদ্ধিমানের কাজ হবে
                return "বস্, ব্রাউজার সিকিউরিটির কারণে কানেকশন ব্লক হচ্ছে।";
            }
        }

        function toggleVoice() {
            if (!isListening) { recognition.start(); isListening = true; document.getElementById('status').innerText = "LISTENING..."; }
            else { recognition.stop(); isListening = false; document.getElementById('status').innerText = "TAP TO SPEAK"; }
        }

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            addMsg('user', speech);
            isListening = false;
            document.getElementById('status').innerText = "THINKING...";
            const res = await getAIResponse(speech);
            addMsg('ai', res);
            speak(res);
            document.getElementById('status').innerText = "TAP TO SPEAK";
        };

        async function sendChat() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if(!prompt) return;
            addMsg('user', prompt);
            input.value = "";
            const res = await getAIResponse(prompt);
            addMsg('ai', res);
            speak(res);
        }

        function addMsg(role, text) {
            const area = document.getElementById('msgArea');
            area.innerHTML += `<div class="${role}-msg">${text}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        // মাল্টি-কালার কোডিং
        setInterval(() => {
            const cs = document.getElementById('codeStream');
            const d = document.createElement('div');
            const cls = ['c-g', 'c-p', 'c-n', 'c-v'][Math.floor(Math.random()*4)];
            d.className = cls;
            d.innerText = `> LOG_${Math.random().toString(36).substring(7).toUpperCase()}_OK`;
            cs.appendChild(d);
            if(cs.childNodes.length > 15) cs.removeChild(cs.childNodes[1]);
        }, 1000);

        async function initCamera() {
            try { const s = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('v').srcObject = s; } 
            catch(e) { console.log("Cam Blocked"); }
        }
        window.onload = initCamera;
    </script>
</body>
</html>
