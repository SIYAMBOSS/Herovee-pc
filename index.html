<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>HEROVEE V12.0 | ADVANCED AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --green: #00ff44; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .container { flex: 1; display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .grid { background: rgba(10, 10, 10, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .left-grid { display: grid; grid-template-rows: 220px 200px 1fr; gap: 10px; border: none; }
        .panel { background: #050505; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; }
        .header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); padding: 8px; border-bottom: 1px solid #111; background: rgba(0,242,255,0.05); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .map-frame { width: 100%; height: 100%; border: 0; filter: invert(90%) hue-rotate(180deg); }

        /* Multi-color Coding Box */
        .coding-box { padding: 10px; font-family: monospace; font-size: 11px; overflow-y: hidden; }
        .code-green { color: var(--green); }
        .code-pink { color: var(--pink); }
        .code-neon { color: var(--neon); }

        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0d001a 0%, #000 100%); }
        .herovee-btn { 
            width: 280px; height: 280px; border-radius: 50%; border: 4px solid var(--purple);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            cursor: pointer; transition: 0.3s; position: relative; box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
        }
        .herovee-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px var(--purple); }
        .status-text { font-size: 12px; color: #666; margin-top: 10px; font-family: 'Orbitron'; letter-spacing: 2px; }
        .pulse-active { animation: pulse 0.6s infinite alternate; border-color: var(--neon) !important; box-shadow: 0 0 60px var(--neon) !important; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        .chat-box { flex: 1; display: flex; flex-direction: column; background: #080808; }
        .msg-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { background: rgba(255, 0, 85, 0.1); border-left: 3px solid var(--pink); padding: 10px; border-radius: 4px; color: #ddd; align-self: flex-start; max-width: 90%; font-size: 14px; }
        .user-msg { background: rgba(0, 242, 255, 0.1); border-right: 3px solid var(--neon); padding: 10px; border-radius: 4px; color: var(--neon); align-self: flex-end; font-size: 14px; }
        .input-area { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="panel">
                <div class="header">SYSTEM_EYE_01</div>
                <video id="v" autoplay muted playsinline></video>
            </div>
            <div class="panel">
                <div class="header">GEO_TRACKING_WORLD</div>
                <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14608.0369448503!2d90.4125!3d23.7509!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sbn!2sbd!4v1710500000000"></iframe>
            </div>
            <div class="panel coding-box" id="codeStream">
                <div class="header" style="margin-bottom:5px; color: var(--neon);">CORE_KINETICS</div>
            </div>
        </div>

        <div class="grid ai-core">
            <div class="herovee-btn" id="voiceBtn" onclick="handleVoiceClick()">
                <div id="ringLabel" style="font-family: 'Orbitron'; color: var(--neon); font-size: 28px; font-weight: bold;">HEROVEE</div>
                <div class="status-text" id="status">TAP TO SPEAK</div>
            </div>
        </div>

        <div class="grid chat-box">
            <div class="header">SECURE_COMMUNICATION</div>
            <div class="msg-area" id="msgArea">
                <div class="ai-msg">সিস্টেম অনলাইন। বস্, আপনার সব মডিউল সচল করা হয়েছে।</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="এখানে মেসেজ লিখুন..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        
        const synth = window.speechSynthesis;
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-BD';
        recognition.continuous = false;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            ut.voice = voices.find(v => v.lang.includes('bn')) || voices[0];
            ut.pitch = 0.8; ut.rate = 0.95;
            ut.onstart = () => document.getElementById('voiceBtn').classList.add('pulse-active');
            ut.onend = () => document.getElementById('voiceBtn').classList.remove('pulse-active');
            synth.speak(ut);
        }

        // API Call Fix
        async function getAIResponse(prompt) {
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "system", content: "You are HEROVEE AI. Created by Sadaf. Speak in smart Bengali." }, { role: "user", content: prompt }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            } catch (e) {
                console.error(e);
                return "বস্, এপিআই রেসপন্স করছে না। দয়া করে কী অথবা ব্যালেন্স চেক করুন।";
            }
        }

        // ভয়েস বাটন হ্যান্ডলার (Tap to toggle)
        function handleVoiceClick() {
            if (!isListening) {
                recognition.start();
                isListening = true;
                document.getElementById('status').innerText = "LISTENING...";
                document.getElementById('voiceBtn').style.borderColor = "var(--green)";
            } else {
                recognition.stop();
                isListening = false;
                document.getElementById('status').innerText = "TAP TO SPEAK";
                document.getElementById('voiceBtn').style.borderColor = "var(--purple)";
            }
        }

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            addMsg('user', speech);
            isListening = false; // কথা বলা শেষ হলে অটো অফ
            document.getElementById('status').innerText = "PROCESSING...";
            
            const response = await getAIResponse(speech);
            addMsg('ai', response);
            speak(response);
            document.getElementById('status').innerText = "TAP TO SPEAK";
        };

        async function sendChat() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if(!prompt) return;
            addMsg('user', prompt);
            input.value = "";
            const response = await getAIResponse(prompt);
            addMsg('ai', response);
            speak(response);
        }

        function addMsg(role, text) {
            const area = document.getElementById('msgArea');
            area.innerHTML += `<div class="${role}-msg">${text}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        // মাল্টি-কালার কোডিং লাইন
        const colors = ['code-green', 'code-pink', 'code-neon'];
        setInterval(() => {
            const cs = document.getElementById('codeStream');
            const d = document.createElement('div');
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            d.className = randomColor;
            d.innerText = `> ${Math.random().toString(36).substring(2, 10).toUpperCase()}_SYNC_COMPLETE`;
            cs.appendChild(d);
            if(cs.childNodes.length > 18) cs.removeChild(cs.childNodes[1]);
        }, 1200);

        async function initCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
            } catch(e) { console.log("Camera access error"); }
        }

        window.onload = () => { initCamera(); };
    </script>
</body>
</html>
