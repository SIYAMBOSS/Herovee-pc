<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>TITAN | HEROVEE SURVEILLANCE V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --yellow: #ffea00; --green: #00ff44; --bg: #000000; --panel: rgba(5, 5, 5, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Container & Grid Setup */
        .container { flex: 1; display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; overflow: hidden; }
        .grid { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* Neon Border Glow */
        .grid::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 1px solid transparent; border-radius: 12px; pointer-events: none; transition: 0.3s; }
        .grid:hover::after { border-color: var(--purple); box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.2); }

        /* Panels */
        .left-grid { display: grid; grid-template-rows: 240px 160px 120px 1fr; gap: 8px; background: none; border: none; }
        .sub-panel { background: #050505; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .panel-header { font-family: 'Orbitron'; font-size: 9px; color: var(--neon); padding: 8px; border-bottom: 1px solid #111; letter-spacing: 2px; text-transform: uppercase; background: rgba(0, 242, 255, 0.05); }

        /* Webcam Area */
        .live-cam-container { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.2) contrast(1.2) brightness(1.1); }
        .cam-btn { position: absolute; padding: 12px 20px; background: var(--pink); border: none; color: #fff; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 4px; z-index: 30; box-shadow: 0 0 20px var(--pink); transition: 0.3s; }
        .cam-tag { position: absolute; top: 10px; left: 10px; color: var(--pink); font-size: 10px; font-family: 'Orbitron'; animation: blink 1s infinite; z-index: 10; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* Global Map Markers */
        .map-content { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .map-img { width: 100%; opacity: 0.2; filter: invert(1) hue-rotate(180deg); }
        .marker { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: pulse-m 2s infinite; }
        @keyframes pulse-m { 0% { transform: scale(1); box-shadow: 0 0 0 0 currentColor; } 70% { transform: scale(2.5); box-shadow: 0 0 0 10px transparent; } 100% { transform: scale(1); } }

        /* Middle AI Core Visual */
        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0c001a 0%, #000 100%); }
        .core-visual { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        .outer-circle { position: absolute; width: 100%; height: 100%; border: 2px solid var(--purple); border-radius: 50%; opacity: 0.3; border-style: dashed; animation: rotate 20s linear infinite; }
        .inner-glow { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); border-radius: 50%; filter: blur(20px); animation: flux 3s infinite alternate; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flux { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 0.9; transform: scale(1.2); } }

        /* Command Input */
        .secret-box { margin-top: 40px; width: 85%; }
        .secret-input { width: 100%; background: #0a0a0a; border: 1px solid var(--neon); border-radius: 5px; padding: 15px; color: var(--neon); font-size: 16px; text-transform: uppercase; outline: none; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        /* Log Panels */
        .chat-view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-family: 'Rajdhani'; }
        .msg { padding: 10px; border-radius: 4px; font-size: 14px; line-height: 1.4; }
        .ai-msg { color: #aaa; border-left: 3px solid var(--pink); background: rgba(255, 0, 85, 0.05); }
        .user-msg { color: var(--neon); border-right: 3px solid var(--neon); align-self: flex-end; text-align: right; background: rgba(0, 242, 255, 0.05); }
        .code-stream { padding: 10px; color: var(--green); font-family: 'Courier New', monospace; font-size: 11px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="sub-panel">
                <div class="cam-tag"><i class="fa fa-circle"></i> HD_LIVE_FEED</div>
                <div class="live-cam-container">
                    <button class="cam-btn" id="startCam">GRANT PERMISSION & START FEED</button>
                    <video id="webcam" autoplay muted playsinline></video>
                </div>
            </div>
            
            <div class="sub-panel">
                <div class="panel-header">RADAR_SURVEILLANCE</div>
                <div class="map-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" class="map-img">
                    <div class="marker" style="top: 35%; left: 25%; color: var(--pink); background: var(--pink);"></div>
                    <div class="marker" style="top: 50%; left: 60%; color: var(--green); background: var(--green);"></div>
                </div>
            </div>

            <div class="sub-panel">
                <div class="panel-header">DEVICE_INTEL</div>
                <div style="padding: 10px; font-size: 11px; color: #666;">
                    <div>IP_STATUS: <span style="color:var(--neon)" id="ipAddr">STABLE</span></div>
                    <div>FIREWALL: <span style="color:var(--green)">ACTIVE</span></div>
                    <div>ENCRYPTION: <span style="color:var(--purple)">AES_256</span></div>
                </div>
            </div>

            <div class="sub-panel code-stream" id="codeStream"></div>
        </div>

        <div class="grid ai-core">
            <div class="core-visual">
                <div class="outer-circle"></div>
                <div class="inner-glow"></div>
                <div style="color: var(--neon); font-family: 'Orbitron'; font-size: 12px; letter-spacing: 5px; z-index: 10;">HEROVEE</div>
            </div>
            <div class="secret-box">
                <input type="text" class="secret-input" id="ttsInput" placeholder="AWAITING COMMAND..." onkeypress="handleCommand(event)">
            </div>
        </div>

        <div class="grid">
            <div class="panel-header" style="color: var(--purple);">ENCRYPTED_LOGS</div>
            <div class="chat-view" id="chatHistory">
                <div class="msg ai-msg">বস্, সিস্টেম অনলাইনে আছে। আপনার আদেশের অপেক্ষায়।</div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startCam');
        const video = document.getElementById('webcam');

        // Camera Initialization
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                addMsg('ai', "ভিডিও ফিড স্টাবলিশড। গ্লোবাল স্ক্যানিং শুরু হয়েছে।");
            } catch (err) {
                alert("ক্যামেরা এক্সেস ডিনাইড!");
            }
        });

        // Terminal Log Animation
        const logs = ["> SYNCING_SERVER...", "> DECRYPTING_PACKET", "> BYPASSING_PROXY", "> FEED_SECURED", "> DATA_STREAM_UP"];
        setInterval(() => {
            const el = document.getElementById('codeStream');
            const d = document.createElement('div');
            d.innerText = logs[Math.floor(Math.random() * logs.length)] + " [" + Math.random().toString(16).slice(2,5).toUpperCase() + "]";
            el.appendChild(d);
            if(el.childNodes.length > 12) el.removeChild(el.firstChild);
            el.scrollTop = el.scrollHeight;
        }, 800);

        // Command & Voice Logic
        const synth = window.speechSynthesis;
        function handleCommand(e) {
            if(e.key === 'Enter' && e.target.value.trim()) {
                const cmd = e.target.value;
                addMsg('user', cmd);
                
                // Voice Response
                const ut = new SpeechSynthesisUtterance(cmd);
                ut.lang = 'bn-BD';
                ut.rate = 0.9;
                ut.pitch = 0.8;
                synth.speak(ut);
                
                e.target.value = "";
                
                // Simulated AI thinking
                setTimeout(() => {
                    addMsg('ai', "আদেশ কার্যকর করা হচ্ছে... [STATUS: SUCCESS]");
                }, 1000);
            }
        }

        function addMsg(role, text) {
            const h = document.getElementById('chatHistory');
            const m = document.createElement('div');
            m.className = `msg ${role}-msg`;
            m.innerText = text;
            h.appendChild(m);
            h.scrollTop = h.scrollHeight;
        }

        // Random IP generator
        setInterval(() => {
            document.getElementById('ipAddr').innerText = `103.25.241.${Math.floor(Math.random() * 255)}`;
        }, 4000);
    </script>
</body>
</html>
