<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>TITAN | HEROVEE SURVEILLANCE V3.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --green: #00ff44; --bg: #000000; --panel: rgba(10, 10, 10, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Container Layout Adjustments */
        .container { flex: 1; display: grid; grid-template-columns: 350px 1fr 350px; gap: 12px; padding: 15px; overflow: hidden; }
        .grid { background: var(--panel); border: 1px solid #222; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }

        /* Panels */
        .left-grid { display: grid; grid-template-rows: 250px 180px 100px 1fr; gap: 10px; background: none; border: none; }
        .sub-panel { background: #080808; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .panel-header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); padding: 10px; border-bottom: 1px solid #111; letter-spacing: 2px; text-transform: uppercase; background: rgba(0, 242, 255, 0.03); }

        /* Camera Box Fix */
        .live-cam-container { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-btn { position: absolute; padding: 15px 25px; background: var(--pink); border: none; color: #fff; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; border-radius: 5px; z-index: 100; box-shadow: 0 0 25px var(--pink); }

        /* World Map Fix */
        .map-content { flex: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .map-img { width: 130%; opacity: 0.3; filter: invert(1) hue-rotate(180deg); pointer-events: none; }
        .marker { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: pulse-m 2s infinite; }
        @keyframes pulse-m { 0% { transform: scale(1); box-shadow: 0 0 0 0 currentColor; } 70% { transform: scale(2.5); box-shadow: 0 0 0 10px transparent; } 100% { transform: scale(1); } }

        /* Coding Box Text Size */
        .code-stream { padding: 12px; color: var(--green); font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6; overflow-y: hidden; }

        /* Middle Grid Resizing */
        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #0d001a 0%, #000 100%); padding: 20px; }
        .core-visual { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .outer-circle { position: absolute; width: 100%; height: 100%; border: 2px solid var(--purple); border-radius: 50%; border-style: dashed; animation: rotate 25s linear infinite; opacity: 0.5; }
        .inner-glow { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); border-radius: 50%; filter: blur(15px); animation: flux 3s infinite alternate; }

        /* Chat Input Area (SMS Sent Box style) */
        .input-container { width: 100%; max-width: 500px; margin-top: 40px; position: relative; }
        .secret-input { 
            width: 100%; background: #0a0a0a; border: 1px solid var(--neon); border-radius: 50px; 
            padding: 18px 60px 18px 25px; color: var(--neon); font-size: 16px; outline: none;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); transition: 0.3s;
        }
        .secret-input:focus { box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); border-color: #fff; }
        .send-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--neon); font-size: 20px; cursor: pointer; padding: 10px; }

        /* Right Logs */
        .chat-view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 8px; font-size: 15px; max-width: 90%; }
        .ai-msg { color: #ccc; border-left: 4px solid var(--pink); background: rgba(255,0,85,0.05); align-self: flex-start; }
        .user-msg { color: var(--neon); border-right: 4px solid var(--neon); background: rgba(0, 242, 255, 0.05); align-self: flex-end; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="sub-panel">
                <div class="panel-header">SECURE_FEED_V2</div>
                <div class="live-cam-container" id="camContainer">
                    <button class="cam-btn" id="startCam"><i class="fa fa-video"></i> INITIALIZE CAMERA</button>
                    <video id="webcam" autoplay muted playsinline></video>
                </div>
            </div>
            
            <div class="sub-panel">
                <div class="panel-header">GEOLOCATION_SCAN</div>
                <div class="map-content">
                    <img src="https://simplemaps.com/static/svg/world/world.svg" class="map-img" id="worldMap">
                    <div class="marker" style="top: 35%; left: 25%; color: var(--pink); background: var(--pink);"></div>
                    <div class="marker" style="top: 50%; left: 70%; color: var(--green); background: var(--green);"></div>
                    <div class="marker" style="top: 45%; left: 85%; color: var(--neon); background: var(--neon);"></div>
                </div>
            </div>

            <div class="sub-panel">
                <div class="panel-header">DEVICE_STATUS</div>
                <div style="padding: 10px; font-size: 12px; color: #888;">
                    <div>IP_STATUS: <span style="color:var(--neon)" id="ipAddr">103.25.241.0</span></div>
                    <div>FIREWALL: <span style="color:var(--green)">PROTECTED</span></div>
                </div>
            </div>

            <div class="sub-panel code-stream" id="codeStream"></div>
        </div>

        <div class="grid ai-core">
            <div class="core-visual">
                <div class="outer-circle"></div>
                <div class="inner-glow"></div>
                <div style="color: var(--neon); font-family: 'Orbitron'; font-size: 14px; letter-spacing: 5px; z-index: 10;">HEROVEE</div>
            </div>
            
            <div class="input-container">
                <input type="text" class="secret-input" id="ttsInput" placeholder="Enter encrypted message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="grid">
            <div class="panel-header" style="color: var(--purple);">COMMAND_LOGS</div>
            <div class="chat-view" id="chatHistory">
                <div class="msg ai-msg">সিস্টেম আপডেট করা হয়েছে, বস্। ক্যামেরা এবং ম্যাপ চেক করুন।</div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startCam');

        // Improved Camera Logic
        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                addMsg('ai', "ক্যামেরা ফিড অ্যাক্টিভেট করা হয়েছে।");
            } catch (err) {
                console.error(err);
                alert("ক্যামেরা এক্সেস পাওয়া যাচ্ছে না। ব্রাউজার পারমিশন চেক করুন।");
            }
        };

        // Coding Line Text
        const logs = ["> UPLOADING_CORE...", "> SYSTEM_UPDATING...", "> MAP_SYNC_OK", "> BYPASS_SECURE_GATE", "> FEED_STABILIZED"];
        setInterval(() => {
            const el = document.getElementById('codeStream');
            const d = document.createElement('div');
            d.innerText = logs[Math.floor(Math.random() * logs.length)] + " [" + Math.random().toString(16).slice(2,5).toUpperCase() + "]";
            el.appendChild(d);
            if(el.childNodes.length > 10) el.removeChild(el.firstChild);
        }, 1200);

        // Messaging Logic
        function sendMessage() {
            const input = document.getElementById('ttsInput');
            const text = input.value.trim();
            if (text) {
                addMsg('user', text);
                speak(text);
                input.value = "";
                setTimeout(() => addMsg('ai', "আদেশ গৃহীত হয়েছে। প্রসেসিং চলছে..."), 1000);
            }
        }

        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'bn-BD';
            ut.rate = 0.8;
            window.speechSynthesis.speak(ut);
        }

        function addMsg(role, text) {
            const h = document.getElementById('chatHistory');
            const m = document.createElement('div');
            m.className = `msg ${role}-msg`;
            m.innerText = text;
            h.appendChild(m);
            h.scrollTop = h.scrollHeight;
        }

        // Random IP Status
        setInterval(() => {
            document.getElementById('ipAddr').innerText = `103.25.241.${Math.floor(Math.random() * 255)}`;
        }, 3000);
    </script>
</body>
</html>
