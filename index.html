<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>TITAN | HD SURVEILLANCE V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --pink: #ff0055; --yellow: #ffea00; --green: #00ff44; --bg: #000000; --panel: rgba(5, 5, 5, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .container { flex: 1; display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; overflow: hidden; }
        .grid { background: var(--panel); border: 1px solid #111; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* Left Panel Sections - Camera Box Enlarged */
        .left-grid { display: grid; grid-template-rows: 240px 160px 120px 1fr; gap: 8px; background: none; border: none; }
        .sub-panel { background: #050505; border: 1px solid #151515; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .panel-header { font-family: 'Orbitron'; font-size: 8px; color: var(--neon); padding: 8px; border-bottom: 1px solid #111; letter-spacing: 1px; text-transform: uppercase; }

        /* 1. LARGE HD LIVE CAMERA */
        .live-cam-container { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .cam-btn { position: absolute; padding: 12px 20px; background: var(--pink); border: none; color: #fff; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 4px; z-index: 30; box-shadow: 0 0 15px var(--pink); transition: 0.3s; }
        .cam-btn:hover { transform: scale(1.05); background: #ff1e6e; }
        .cam-tag { position: absolute; top: 10px; left: 10px; color: var(--pink); font-size: 10px; font-family: 'Orbitron'; animation: blink 1s infinite; z-index: 10; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* 2. World Map */
        .map-content { flex: 1; position: relative; background: #010101; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .map-img { width: 100%; height: auto; opacity: 0.35; filter: invert(1) hue-rotate(180deg) brightness(0.9) contrast(1.3); }
        .marker { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: pulse-m 2s infinite; box-shadow: 0 0 10px currentColor; }
        .m-red { color: var(--pink); background: var(--pink); }
        .m-yellow { color: var(--yellow); background: var(--yellow); }
        .m-green { color: var(--green); background: var(--green); }
        @keyframes pulse-m { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.8); opacity: 1; } }

        /* 3. Device Intelligence */
        .intel-box { padding: 10px; font-size: 10px; color: #555; gap: 4px; }
        .intel-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 3px 0; }
        .intel-val { color: var(--purple); font-family: 'Courier New'; }

        /* 4. Coding Box (Streamlined) */
        .code-stream { flex: 1; padding: 10px; font-family: 'Courier New', monospace; font-size: 10px; color: #004400; overflow: hidden; }

        /* Middle Grid AI Core */
        .ai-core { align-items: center; justify-content: center; background: radial-gradient(circle, #080808 0%, #000 100%); }
        .core-visual { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
        .outer-circle { position: absolute; width: 100%; height: 100%; border: 1px solid var(--neon); border-radius: 50%; opacity: 0.2; animation: rotate 15s linear infinite; }
        .inner-glow { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, #2a0044 0%, transparent 80%); border-radius: 50%; filter: blur(15px); animation: flux 4s infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flux { 50% { transform: scale(1.3); opacity: 0.8; } }

        .secret-box { margin-top: 50px; width: 80%; }
        .secret-input { width: 100%; background: #030303; border: 1px solid #111; border-radius: 30px; padding: 12px; color: #444; font-size: 14px; text-align: center; outline: none; transition: 0.5s; letter-spacing: 2px; }
        .secret-input:focus { border-color: #222; color: #fff; box-shadow: 0 0 15px rgba(0,242,255,0.05); }

        /* Right Panel History */
        .chat-view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px; border-radius: 6px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .ai-msg { align-self: flex-start; color: #888; border-left: 2px solid var(--pink); background: rgba(255,0,85,0.01); }
        .user-msg { align-self: flex-end; color: var(--neon); border-right: 2px solid var(--neon); background: rgba(0, 242, 255, 0.01); }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid left-grid">
            <div class="sub-panel">
                <div class="cam-tag"><i class="fa fa-circle"></i> HD_LIVE_STREAM</div>
                <div class="live-cam-container" id="camContainer">
                    <button class="cam-btn" id="startCam">ALLOW CAMERA ACCESS</button>
                    <video id="webcam" autoplay muted playsinline></video>
                </div>
            </div>
            
            <div class="sub-panel map-box">
                <div class="panel-header">GLOBAL_SURVEILLANCE</div>
                <div class="map-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" class="map-img">
                    <div class="marker m-red" style="top: 35%; left: 25%;"></div>
                    <div class="marker m-red" style="top: 48%; left: 58%;"></div>
                    <div class="marker m-red" style="top: 28%; left: 78%;"></div>
                    <div class="marker m-yellow" style="top: 68%; left: 32%;"></div>
                    <div class="marker m-yellow" style="top: 58%; left: 88%;"></div>
                    <div class="marker m-green" style="top: 78%; left: 55%;"></div>
                </div>
            </div>

            <div class="sub-panel">
                <div class="panel-header">SYSTEM_INTEL</div>
                <div class="intel-box">
                    <div class="intel-row"><span>IP_ADDR:</span> <span class="intel-val" id="ipAddr">FETCHING...</span></div>
                    <div class="intel-row"><span>SEC_TYPE:</span> <span class="intel-val" style="color:var(--green)">ENCRYPTED</span></div>
                    <div class="intel-row"><span>SIGNAL:</span> <span class="intel-val">EXCELLENT</span></div>
                </div>
            </div>

            <div class="sub-panel code-stream" id="codeStream"></div>
        </div>

        <div class="grid ai-core">
            <div class="core-visual">
                <div class="outer-circle"></div>
                <div class="inner-glow"></div>
            </div>
            <div class="secret-box">
                <input type="text" class="secret-input" id="ttsInput" placeholder="ENTER ENCRYPTED COMMAND..." onkeypress="handleTTS(event)">
            </div>
        </div>

        <div class="grid">
            <div style="padding: 10px; font-family: 'Orbitron'; font-size: 9px; color: var(--purple); border-bottom: 1px solid #111;">COMMAND_LOGS</div>
            <div class="chat-view" id="chatHistory">
                <div class="msg ai-msg">বস্, ক্যামেরা বক্সটি বড় করা হয়েছে। 'ALLOW' বাটনে ক্লিক করে পারমিশন দিন।</div>
            </div>
        </div>
    </div>

    <script>
        // Camera Permission Logic with detailed error handling
        const startBtn = document.getElementById('startCam');
        const video = document.getElementById('webcam');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        facingMode: "user" 
                    } 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                addMsg('ai', "ক্যামেরা সাকসেসফুলি কানেক্ট হয়েছে বস্।");
            } catch (err) {
                console.error("Camera Error: ", err);
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    alert("বস্, ব্রাউজার সেটিংস থেকে ক্যামেরা পারমিশন 'Allow' করুন।");
                } else {
                    alert("ক্যামেরা হার্ডওয়্যার খুঁজে পাওয়া যায়নি।");
                }
            }
        });

        // Dynamic IP & Logs
        setInterval(() => {
            document.getElementById('ipAddr').innerText = `103.25.241.${Math.floor(Math.random() * 255)}`;
        }, 5000);

        const logs = ["> LINKING...", "> HD_FEED_ENABLED", "> SURVEILLANCE_ON", "> BYPASS_ACTIVE"];
        setInterval(() => {
            const el = document.getElementById('codeStream');
            const d = document.createElement('div');
            d.innerText = logs[Math.floor(Math.random() * logs.length)] + " [" + Math.random().toString(16).slice(2,5) + "]";
            el.appendChild(d);
            if(el.childNodes.length > 8) el.removeChild(el.firstChild);
            el.scrollTop = el.scrollHeight;
        }, 900);

        // PREMIUM HD VOICE LOGIC
        const synth = window.speechSynthesis;
        function handleTTS(e) {
            if(e.key === 'Enter' && e.target.value.trim()) {
                const text = e.target.value;
                addMsg('user', text);
                
                const ut = new SpeechSynthesisUtterance(text);
                // ভয়েস আরও প্রফেশনাল করার জন্য
                const voices = synth.getVoices();
                ut.lang = 'bn-BD';
                ut.rate = 0.85; // শান্ত এবং গম্ভীর গতি
                ut.pitch = 0.75; // গম্ভীর টোন
                ut.volume = 1; 
                
                synth.speak(ut);
                e.target.value = "";
            }
        }

        function addMsg(role, text) {
            const h = document.getElementById('chatHistory');
            const m = document.createElement('div');
            m.className = `msg ${role}-msg`;
            m.innerText = text;
            h.appendChild(m);
            h.scrollTop = h.scrollHeight;
        }
    </script>
</body>
</html>
