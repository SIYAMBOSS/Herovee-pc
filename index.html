<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN | AUTO-INTEL RADAR OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff44; --pink-glow: #ff0055; --dark-bg: #000; --panel-bg: rgba(8, 8, 8, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; cursor: crosshair; }
        body { background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 12px; }

        /* Dashboard Grid */
        .dashboard { display: grid; grid-template-columns: 350px 1fr 350px; grid-template-rows: 1fr 180px; gap: 15px; height: 100%; }
        .panel { background: var(--panel-bg); border: 1px solid #1a1a1a; border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon-green); padding: 12px; border-bottom: 1px solid #111; letter-spacing: 2px; background: rgba(255,255,255,0.01); }

        /* Left: Auto-Intel Panel */
        .left-col { display: flex; flex-direction: column; gap: 15px; grid-row: span 2; }
        .intel-box { flex: 1; padding: 15px; font-size: 13px; line-height: 2.5; color: #888; }
        .val { color: var(--neon-green); font-family: 'Courier New'; font-weight: bold; }

        /* Center: BD Map & Radar */
        .center-col { grid-column: 2; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #051505 0%, #000 100%); border: 1px solid rgba(0, 255, 68, 0.1); }
        .radar-frame { width: 380px; height: 380px; border: 2px solid var(--neon-green); border-radius: 50%; position: absolute; background: repeating-radial-gradient(circle, transparent, transparent 30px, rgba(0, 255, 68, 0.03) 31px); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; background: linear-gradient(45deg, transparent, rgba(0, 255, 68, 0.4)); transform-origin: bottom left; animation: sweep 4s linear infinite; border-left: 2px solid var(--neon-green); }
        .bd-map { width: 70%; filter: drop-shadow(0 0 15px rgba(0, 255, 68, 0.4)) invert(1) hue-rotate(90deg); opacity: 0.7; z-index: 5; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Bottom: Access UI */
        .access-panel { grid-column: 2; grid-row: 2; display: flex; align-items: center; justify-content: center; border-top: 2px solid var(--pink-glow); }
        .access-btn { border: 2px solid var(--pink-glow); padding: 20px 50px; border-radius: 6px; color: var(--pink-glow); font-family: 'Orbitron'; font-size: 14px; letter-spacing: 5px; box-shadow: 0 0 20px rgba(255, 0, 85, 0.1); }

        /* Right: Sound & Wireframe */
        .right-col { display: flex; flex-direction: column; gap: 15px; grid-row: span 2; }
        .sound-box { flex: 1; padding: 20px; display: flex; align-items: flex-end; justify-content: center; gap: 6px; background: #050505; }
        .bar { width: 10px; background: var(--neon-green); height: 10px; transition: 0.1s; border-radius: 2px 2px 0 0; box-shadow: 0 0 10px var(--neon-green); }

        /* Status Line */
        .status-line { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 5px 20px; font-family: 'Courier New'; font-size: 10px; color: var(--neon-green); border-top: 1px solid #111; display: flex; gap: 30px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="left-col">
            <div class="panel intel-box">
                <div class="header">VISITOR_INTEL</div>
                <div>NODE_IP: <span class="val" id="ip">Detecting...</span></div>
                <div>REGION: <span class="val" id="location">Scanning...</span></div>
                <div>ISP: <span class="val" id="isp">Checking...</span></div>
                <div>NETWORK: <span class="val" id="netType">Unknown</span></div>
                <div>SECURITY: <span class="val" style="color:var(--pink-glow)">LEVEL_4_ENC</span></div>
                <div class="header" style="margin-top:20px;">SYSTEM_LOGS</div>
                <div id="logs" style="font-size:10px; color:#555; line-height:1.8;">
                    > ANALYZING_CONNECTION...<br>> ENCRYPTING_DATA...
                </div>
            </div>
        </div>

        <div class="panel center-col">
            <div class="header">TARGET_AREA: BANGLADESH_HQ</div>
            <div class="radar-frame">
                <div class="radar-sweep"></div>
            </div>
            <img src="https://www.freeiconspng.com/thumbs/map-of-bangladesh/map-of-bangladesh-png-9.png" class="bd-map">
        </div>

        <div class="panel access-panel">
            <div class="access-btn">GRANT ACCESS & SYNC</div>
        </div>

        <div class="right-col">
            <div class="panel" style="flex:2; background:#000;">
                <div class="header">LIVE_CAM_UPLINK</div>
                <video id="webcam" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            <div class="panel">
                <div class="header">VOICE_FREQ_SYNC</div>
                <div class="sound-box" id="eq"></div>
            </div>
        </div>
    </div>

    <div class="status-line" id="statusLine">
        <span>> TITAN_STABLE</span>
        <span>> UPLINK_ESTABLISHED</span>
    </div>

    <script>
        // ১. অটোমেটিক আইপি ও লোকেশন ডিটেকশন
        async function fetchIntel() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('location').innerText = `${data.city}, ${data.country_name}`;
                document.getElementById('isp').innerText = data.org;
                
                // নেটওয়ার্ক ডিটেকশন
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn) document.getElementById('netType').innerText = conn.effectiveType.toUpperCase();
            } catch (err) {
                document.getElementById('ip').innerText = "127.0.0.1 (LOCAL)";
            }
        }

        // ২. লাইভ ভয়েস ইকুইলাইজার
        const eq = document.getElementById('eq');
        const bars = [];
        for(let i=0; i<15; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            eq.appendChild(b);
            bars.push(b);
        }

        async function startSystem() {
            fetchIntel();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam').srcObject = stream;
                
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 64;
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    bars.forEach((bar, i) => {
                        const h = Math.max(10, (dataArray[i] / 255) * 80);
                        bar.style.height = h + 'px';
                    });
                }
                draw();
            } catch (e) { console.log("Permission denied"); }
        }

        // ৩. স্ট্যাটাস লগ আপডেট
        const logs = ["> NODE_STABLE", "> SYNCING_GEOLOCATION", "> DATA_SECURED", "> MONITORING_ACTIVE"];
        setInterval(() => {
            const s = document.createElement('span');
            s.innerText = logs[Math.floor(Math.random() * logs.length)];
            document.getElementById('statusLine').appendChild(s);
            if(document.getElementById('statusLine').childNodes.length > 7) 
                document.getElementById('statusLine').removeChild(document.getElementById('statusLine').childNodes[0]);
        }, 3000);

        window.onload = startSystem;
    </script>
</body>
</html>
