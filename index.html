<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN | BD SURVEILLANCE OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff44; --pink-glow: #ff0055; --dark-bg: #000; --panel-bg: rgba(10, 10, 10, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 12px; }

        /* Main Grid Layout */
        .dashboard { display: grid; grid-template-columns: 350px 1fr 350px; grid-template-rows: 1fr 200px; gap: 15px; height: 100%; }
        .panel { background: var(--panel-bg); border: 1px solid #1a1a1a; border-radius: 10px; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: inset 0 0 15px rgba(0, 255, 68, 0.02); }
        .header { font-family: 'Orbitron'; font-size: 10px; color: var(--neon-green); padding: 12px; border-bottom: 1px solid #111; letter-spacing: 2px; text-transform: uppercase; background: rgba(255,255,255,0.01); }

        /* Left: Camera & Intel */
        .left-col { display: flex; flex-direction: column; gap: 15px; grid-row: span 2; }
        .cam-box { flex: 2; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: var(--pink-glow); border: none; color: #fff; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; box-shadow: 0 0 25px var(--pink-glow); z-index: 10; font-weight: bold; }
        
        .intel-box { flex: 1; padding: 15px; font-size: 12px; line-height: 2.5; color: #888; }
        .ip-val { color: var(--neon-green); font-family: 'Courier New'; font-weight: bold; }

        /* Center: BANGLADESH MAP */
        .center-col { grid-column: 2; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #051a05 0%, #000 100%); border: 1px solid rgba(0, 255, 68, 0.1); }
        .map-container { position: relative; width: 85%; display: flex; align-items: center; justify-content: center; }
        .map-img { width: 100%; filter: drop-shadow(0 0 20px rgba(0, 255, 68, 0.4)) invert(1) hue-rotate(90deg); opacity: 0.8; }
        .target-dot { position: absolute; width: 10px; height: 10px; background: var(--pink-glow); border-radius: 50%; box-shadow: 0 0 10px var(--pink-glow); animation: pulse 1.5s infinite; }

        /* Center Bottom: Access UI */
        .access-panel { grid-column: 2; grid-row: 2; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--pink-glow); background: linear-gradient(to top, #080808, #000); }
        .access-box { border: 2px solid var(--pink-glow); padding: 20px 60px; border-radius: 8px; color: var(--pink-glow); font-family: 'Orbitron'; text-align: center; font-size: 14px; letter-spacing: 4px; box-shadow: 0 0 20px rgba(255, 0, 85, 0.1); }

        /* Right: GREEN RADAR & EQ */
        .right-col { display: flex; flex-direction: column; gap: 15px; grid-row: span 2; }
        .radar-box { flex: 2; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .radar-frame { width: 250px; height: 250px; border: 2px solid var(--neon-green); border-radius: 50%; position: relative; background: repeating-radial-gradient(circle, transparent, transparent 25px, rgba(0, 255, 68, 0.05) 26px); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; background: linear-gradient(45deg, transparent, rgba(0, 255, 68, 0.4)); transform-origin: bottom left; animation: sweep 4s linear infinite; border-left: 2px solid var(--neon-green); }
        .radar-marks { position: absolute; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/grid-me.png'); opacity: 0.1; border-radius: 50%; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* Voice EQ */
        .sound-box { flex: 1; padding: 20px; display: flex; align-items: flex-end; justify-content: center; gap: 6px; background: #050505; }
        .bar { width: 10px; background: var(--neon-green); height: 10px; transition: 0.1s; box-shadow: 0 0 10px var(--neon-green); border-radius: 2px 2px 0 0; }

        /* Status Line */
        .status-line { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 6px 20px; font-family: 'Courier New'; font-size: 10px; color: var(--neon-green); border-top: 1px solid #111; display: flex; gap: 30px; z-index: 100; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="left-col">
            <div class="panel cam-box">
                <div class="header">SURVEILLANCE_UPLINK</div>
                <button class="cam-btn" id="startBtn">GRANT ACCESS</button>
                <video id="webcam" autoplay muted playsinline></video>
            </div>
            <div class="panel intel-box">
                <div class="header">NODE_STATISTICS</div>
                <div>LOCAL_IP: <span class="ip-val" id="ip">103.25.241.***</span></div>
                <div>REGION: <span class="ip-val">DHAKA, BANGLADESH</span></div>
                <div>ENCRYPTION: <span class="ip-val" style="color:var(--pink-glow)">ACTIVE_SSL</span></div>
                <div>UPLINK: <span class="ip-val">STABLE (1.2ms)</span></div>
            </div>
        </div>

        <div class="panel center-col">
            <div class="header">TARGET_AREA_MONITORING</div>
            <div class="map-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Flag_of_Bangladesh.svg/1024px-Flag_of_Bangladesh.svg.png" style="display:none;"> <img src="https://www.freeiconspng.com/thumbs/map-of-bangladesh/map-of-bangladesh-png-9.png" class="map-img">
                <div class="target-dot" style="top:40%; left:50%;"></div>
                <div class="target-dot" style="top:65%; left:75%;"></div>
            </div>
        </div>

        <div class="panel access-panel">
            <div class="access-box">
                GRANT PERMISSION<br>& START FEED
            </div>
        </div>

        <div class="right-col">
            <div class="panel radar-box">
                <div class="header">360_SCANNING_RADAR</div>
                <div class="radar-frame">
                    <div class="radar-marks"></div>
                    <div class="radar-sweep"></div>
                </div>
            </div>
            <div class="panel">
                <div class="header">AUDIO_FREQ_RESPONSE</div>
                <div class="sound-box" id="eq"></div>
            </div>
        </div>
    </div>

    <div class="status-line" id="statusLine">
        <span>> TITAN_V5_STABLE</span>
        <span>> RADAR_TRACKING_ONLINE</span>
        <span>> ENCRYPTING_SIGNAL...</span>
    </div>

    <script>
        // Audio/Video Setup
        const eq = document.getElementById('eq');
        const bars = [];
        for(let i=0; i<15; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            eq.appendChild(b);
            bars.push(b);
        }

        const btn = document.getElementById('startBtn');
        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam').srcObject = stream;
                btn.style.display = 'none';
                
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 64;
                const data = new Uint8Array(analyser.frequencyBinCount);

                function animate() {
                    requestAnimationFrame(animate);
                    analyser.getByteFrequencyData(data);
                    bars.forEach((bar, i) => {
                        const val = data[i] || 0;
                        const h = Math.max(10, (val / 255) * 80);
                        bar.style.height = h + 'px';
                        bar.style.opacity = 0.5 + (val / 255);
                    });
                }
                animate();
            } catch(e) { alert("Please allow camera/mic access."); }
        });

        // Fake IP update
        setInterval(() => {
            document.getElementById('ip').innerText = `103.25.241.${Math.floor(Math.random() * 255)}`;
        }, 4000);
    </script>
</body>
</html>
